<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AD & ART - BUMDesa Mappakengka Buana Paselloreng</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --primary-green: #0b2e26;
            --eco-medium: #1e5128;
            --eco-light: #4e944f;
            --accent-lime: #b4ff9f;
            --glass-bg: rgba(255, 255, 255, 0.85); 
            --glass-border: rgba(255, 255, 255, 0.9);
            --text-main: #0b2e26;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Sora', sans-serif; }

        body {
            background: 
                linear-gradient(rgba(244, 252, 244, 0.92), rgba(244, 252, 244, 0.92)),
                url('https://images.unsplash.com/photo-1589829545856-d10d557cf95f?auto=format&fit=crop&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text-main);
        }

        /* --- FIXED NAVIGATION --- */
        .nav-wrapper { 
            position: fixed; 
            top: 0; left: 0; width: 100%; 
            z-index: 9999; padding: 20px; 
            display: flex; justify-content: center;
            transition: all 0.4s ease;
            pointer-events: none;
        }
        
        nav { 
            pointer-events: auto; 
            background: rgba(255, 255, 255, 0.6); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); 
            border: 1px solid var(--glass-border); 
            border-radius: 15px; padding: 8px; 
            box-shadow: 0 5px 20px rgba(11, 46, 38, 0.1); 
            transition: all 0.3s ease;
        }

        .nav-scrolled { padding: 10px 20px; }
        .nav-scrolled nav { background: rgba(255, 255, 255, 0.95); }

        nav ul { display: flex; list-style: none; }
        nav ul li a {
            text-decoration: none; color: var(--primary-green);
            font-weight: 600; font-size: 0.75rem; padding: 12px 25px;
            border-radius: 10px; transition: 0.3s;
            display: flex; align-items: center; gap: 8px;
        }
        nav ul li a:hover { background: rgba(11, 46, 38, 0.1); }

        /* --- CONTENT AREA --- */
        .content-container { max-width: 1300px; margin: 140px auto 60px; padding: 0 20px; }

        .doc-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .doc-header h1 {
            font-size: 2.2rem;
            color: var(--primary-green);
            font-weight: 800;
        }

        /* Grid System 2 Kolom */
        .document-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
        }

        .doc-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(11, 46, 38, 0.08);
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            padding-bottom: 12px;
            border-bottom: 2px solid rgba(11, 46, 38, 0.05);
        }

        .card-title i { color: var(--eco-light); font-size: 1.4rem; }
        .card-title h3 { font-size: 1.1rem; color: var(--primary-green); font-weight: 700; }

        .pdf-frame-container {
            width: 100%;
            height: 550px;
            border-radius: 12px;
            overflow: hidden;
            background: white;
            border: 1px solid #eee;
            margin-bottom: 20px;
        }

        iframe { width: 100%; height: 100%; border: none; }

        .btn-download {
            background: var(--primary-green);
            color: white;
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
            font-size: 0.85rem;
        }

        .btn-download:hover {
            background: var(--eco-medium);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(11, 46, 38, 0.2);
        }

        footer { text-align: center; padding: 40px; font-size: 0.8rem; color: var(--primary-green); font-weight: 600; }

        /* Responsive Settings */
        @media (max-width: 992px) {
            .document-grid { grid-template-columns: 1fr; } /* Menjadi 1 kolom di tablet/HP */
            .content-container { margin-top: 120px; }
            .pdf-frame-container { height: 500px; }
        }
    </style>
</head>
<body>

    <div class="nav-wrapper" id="navWrapper">
        <nav id="navbar">
            <ul id="nav-list">
                <li><a href="pendirian.html"><i class="fas fa-arrow-left"></i> KEMBALI KE LEGALITAS</a></li>
            </ul>
        </nav>
    </div>

    <main class="content-container animate__animated animate__fadeIn">
        <header class="doc-header">
            <h1>Anggaran Dasar & <span>ART</span></h1>
            <p style="color: var(--eco-medium); font-weight: 600; margin-top: 10px;">BUMDesa Mappakengka Buana Paselloreng</p>
        </header>

        <div class="document-grid">
            <div class="doc-card">
                <div class="card-title">
                    <i class="fas fa-landmark"></i>
                    <h3>Anggaran Dasar (AD)</h3>
                </div>
                <div class="pdf-frame-container">
                    <iframe src="ad.pdf#toolbar=0&navpanes=0&view=Fith" type="application/pdf"></iframe>
                </div>
                <a href="ad.pdf" download class="btn-download">
                    <i class="fas fa-file-download"></i> UNDUH DOKUMEN
                </a>
            </div>

            <div class="doc-card">
                <div class="card-title">
                    <i class="fas fa-gavel"></i>
                    <h3>Anggaran Rumah Tangga (ART)</h3>
                </div>
                <div class="pdf-frame-container">
                    <iframe src="art.pdf#toolbar=0&navpanes=0&view=Fith" type="application/pdf"></iframe>
                </div>
                <a href="art.pdf" download class="btn-download">
                    <i class="fas fa-file-download"></i> UNDUH DOKUMEN
                </a>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 BUMDesa Mappakengka Buana Paselloreng. <br> Desa Paselloreng, Kec. Gilireng, Kab. Wajo.</p>
    </footer>

    <script>
        const navWrapper = document.getElementById('navWrapper');
        window.addEventListener('scroll', function() {
            if (window.scrollY > 40) {
                navWrapper.classList.add('nav-scrolled');
            } else {
                navWrapper.classList.remove('nav-scrolled');
            }
        });
    </script>
</body>
</html>
