<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SK Pengurus - BUMDesa Mappakengka Buana Paselloreng</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --primary-green: #0b2e26;
            --eco-medium: #1e5128;
            --eco-light: #4e944f;
            --accent-lime: #b4ff9f;
            --glass-bg: rgba(255, 255, 255, 0.85); 
            --glass-border: rgba(255, 255, 255, 0.9);
            --text-main: #0b2e26;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Sora', sans-serif; }

        body {
            background: 
                linear-gradient(rgba(244, 252, 244, 0.92), rgba(244, 252, 244, 0.92)),
                url('https://images.unsplash.com/photo-1521737711867-e3b97375f902?auto=format&fit=crop&q=80'); /* Tema tim/kerjasama */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text-main);
        }

        /* --- FIXED NAVIGATION --- */
        .nav-wrapper { 
            position: fixed; 
            top: 0; left: 0; width: 100%; 
            z-index: 9999; padding: 20px; 
            display: flex; justify-content: center;
            transition: all 0.4s ease;
            pointer-events: none;
        }
        
        nav { 
            pointer-events: auto; 
            background: rgba(255, 255, 255, 0.6); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); 
            border: 1px solid var(--glass-border); 
            border-radius: 15px; padding: 8px; 
            box-shadow: 0 5px 20px rgba(11, 46, 38, 0.1); 
            transition: all 0.3s ease;
        }

        .nav-scrolled { padding: 10px 20px; }
        .nav-scrolled nav { background: rgba(255, 255, 255, 0.95); }

        nav ul { display: flex; list-style: none; }
        nav ul li a {
            text-decoration: none; color: var(--primary-green);
            font-weight: 600; font-size: 0.75rem; padding: 12px 25px;
            border-radius: 10px; transition: 0.3s;
            display: flex; align-items: center; gap: 8px;
        }
        nav ul li a:hover { background: rgba(11, 46, 38, 0.1); }

        /* --- CONTENT AREA --- */
        .content-container { max-width: 1000px; margin: 140px auto 60px; padding: 0 20px; }

        .doc-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .doc-header h1 {
            font-size: 2.2rem;
            color: var(--primary-green);
            font-weight: 800;
            margin-bottom: 10px;
        }

        .badge-sk {
            background: var(--eco-medium);
            color: white;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .viewer-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(11, 46, 38, 0.1);
            border: 1px solid var(--glass-border);
        }

        .pdf-frame-container {
            width: 100%;
            height: 75vh;
            border-radius: 15px;
            overflow: hidden;
            background: white;
            border: 1px solid #eee;
            margin-bottom: 25px;
        }

        iframe { width: 100%; height: 100%; border: none; }

        .info-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .sk-meta {
            font-size: 0.85rem;
            color: var(--eco-medium);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-download {
            background: linear-gradient(135deg, var(--eco-medium), var(--primary-green));
            color: white;
            padding: 16px 35px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.4s ease;
        }

        .btn-download:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(11, 46, 38, 0.2);
        }

        footer { text-align: center; padding: 40px; font-size: 0.8rem; color: var(--primary-green); font-weight: 600; }

        @media (max-width: 768px) {
            .doc-header h1 { font-size: 1.8rem; }
            .content-container { margin-top: 120px; }
            .pdf-frame-container { height: 60vh; }
            .info-footer { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="nav-wrapper" id="navWrapper">
        <nav id="navbar">
            <ul id="nav-list">
                <li><a href="pengurus.html"><i class="fas fa-arrow-left"></i> KEMBALI KE PENGURUS</a></li>
            </ul>
        </nav>
    </div>

    <main class="content-container animate__animated animate__fadeIn">
        <header class="doc-header">
            <div class="badge-sk"><i class="fas fa-user-tie"></i> Legalitas Pengelola</div>
            <h1>Surat Keputusan <span>(SK)</span></h1>
            <p style="color: var(--eco-medium); font-weight: 600;">Penetapan Struktur Pengurus BUMDesa Mappakengka Buana</p>
        </header>

        <div class="viewer-card">
            <div class="pdf-frame-container">
                <iframe src="sk.pdf#toolbar=0&navpanes=0&view=Fith" type="application/pdf">
                    <p>Browser tidak mendukung pratinjau. <a href="sk.pdf">Unduh di sini.</a></p>
                </iframe>
            </div>

            <div class="info-footer">
                <div class="sk-meta">
                    <i class="fas fa-id-card-alt fa-lg"></i>
                    <span>Masa Bakti: 2025 - 2030</span>
                </div>
                
                <a href="sk.pdf" download class="btn-download">
                    <i class="fas fa-file-download"></i> UNDUH DOKUMEN
                </a>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 BUMDesa Mappakengka Buana Paselloreng. <br> Desa Paselloreng, Kec. Gilireng, Kab. Wajo.</p>
    </footer>

    <script>
        const navWrapper = document.getElementById('navWrapper');
        window.addEventListener('scroll', function() {
            if (window.scrollY > 40) {
                navWrapper.classList.add('nav-scrolled');
            } else {
                navWrapper.classList.remove('nav-scrolled');
            }
        });
    </script>
</body>
</html>
